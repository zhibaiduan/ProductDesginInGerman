
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

.quiz{font-family:'DM Sans',sans-serif;max-width:680px;margin:0 auto;padding:24px 0 40px;}

.header{margin-bottom:28px;}
.header-label{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px;}
.header-title{font-family:'Instrument Serif',Georgia,serif;font-size:28px;font-weight:400;color:var(--color-text-primary);line-height:1.2;}
.header-title em{font-style:italic;color:#854F0B;}
.header-sub{font-size:13px;font-weight:300;color:var(--color-text-secondary);margin-top:8px;line-height:1.6;}

.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.progress-bar-track{flex:1;height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:#854F0B;border-radius:2px;transition:width 0.4s ease;}
.progress-text{font-size:11px;font-weight:500;color:var(--color-text-tertiary);white-space:nowrap;}

.q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:24px;margin-bottom:16px;}

.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.q-num{font-size:10px;font-weight:500;letter-spacing:2px;color:var(--color-text-tertiary);}
.q-domain{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;}
.domain-red{background:#FCEBEB;color:#791F1F;}
.domain-orange{background:#FAEEDA;color:#633806;}
.domain-green{background:#EAF3DE;color:#27500A;}

.q-scenario{font-size:13px;font-weight:300;color:var(--color-text-secondary);line-height:1.65;margin-bottom:6px;font-style:italic;padding:12px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:2px solid var(--color-border-secondary);}

.q-text{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.4;margin:14px 0 16px;}

.options{display:flex;flex-direction:column;gap:8px;}

.opt-btn{width:100%;text-align:left;padding:12px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--color-text-primary);line-height:1.4;transition:all 0.15s;display:flex;align-items:flex-start;gap:10px;}
.opt-btn:hover{background:var(--color-background-secondary);border-color:var(--color-border-primary);}
.opt-btn.selected{background:#F7F4EA;border-color:var(--color-border-primary);}
.opt-btn:disabled{cursor:default;}
.opt-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#173404;}
.opt-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313;}
.opt-btn.missed{background:#EAF3DE;border-color:#3B6D11;color:#173404;opacity:0.7;}

.opt-letter{font-size:11px;font-weight:500;width:18px;height:18px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.15s;}
.opt-btn.correct .opt-letter{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11;}
.opt-btn.wrong .opt-letter{background:#A32D2D;color:#FCEBEB;border-color:#A32D2D;}
.opt-btn.missed .opt-letter{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11;}

.feedback{margin-top:14px;padding:12px 14px;border-radius:var(--border-radius-md);font-size:12.5px;font-weight:300;line-height:1.6;display:none;}
.feedback.show{display:block;}
.feedback.correct-fb{background:#EAF3DE;color:#173404;border-left:2px solid #3B6D11;}
.feedback.wrong-fb{background:#FCEBEB;color:#501313;border-left:2px solid #A32D2D;}
.feedback strong{font-weight:500;}

.next-btn{margin-top:16px;width:100%;padding:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--color-text-primary);display:none;transition:all 0.15s;}
.next-btn:hover{background:var(--color-background-secondary);}
.next-btn:disabled{opacity:0.45;cursor:default;}
.next-btn.show{display:block;}

.result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:32px;text-align:center;display:none;}
.result-card.show{display:block;}

.result-score{font-family:'Instrument Serif',serif;font-size:56px;font-weight:400;line-height:1;margin-bottom:4px;}
.result-label{font-size:13px;font-weight:300;color:var(--color-text-secondary);margin-bottom:24px;}
.result-title{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;color:var(--color-text-primary);margin-bottom:8px;}
.result-sub{font-size:13px;font-weight:300;color:var(--color-text-secondary);line-height:1.6;max-width:440px;margin:0 auto 24px;}

.result-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.bd-item{padding:14px 10px;border-radius:var(--border-radius-md);text-align:center;}
.bd-n{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;line-height:1;margin-bottom:4px;}
.bd-label{font-size:11px;font-weight:400;color:var(--color-text-secondary);}

.restart-btn{padding:10px 24px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--color-text-primary);transition:all 0.15s;}
.restart-btn:hover{background:var(--color-background-secondary);}
</style>

<div class="quiz">
  <div class="header">
    <div class="header-label">Germany · Product Compliance · Knowledge Check</div>
    <div class="header-title">Can you survive the <em>German market</em>?</div>
    <div class="header-sub">15 real-world scenarios, including multi-select checkpoints. Pick the right call and see instantly why it matters.</div>
  </div>

  <div class="progress-row">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">0 / 15</div>
  </div>

  <div id="q-container"></div>

  <div class="result-card" id="result-card">
    <div class="result-score" id="result-score"></div>
    <div class="result-label" id="result-label"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-breakdown" id="result-breakdown"></div>
    <button class="restart-btn" onclick="restart()">Retake the quiz</button>
  </div>
</div>

<script src="germany_handbook_app.js"></script>
