
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

:root{
  --color-text-primary:#1A1008;
  --color-text-secondary:#5F5E5A;
  --color-text-tertiary:#888780;
  --color-border-primary:#1A1008;
  --color-border-secondary:#B4B2A9;
  --color-border-tertiary:#D3D1C7;
  --color-background-page:#F8F6F1;
  --color-background-primary:#FFFFFF;
  --color-background-secondary:#F1EFE8;
  --color-background-tertiary:#E8E5DE;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --shadow-soft:0 12px 30px rgba(26,16,8,0.06);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--color-background-page);
  color:var(--color-text-primary);
  font-family:'Plus Jakarta Sans',sans-serif;
  padding:24px 24px 64px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}

.wrap{max-width:680px;margin:0 auto;padding:24px 0 40px;}
.hdr{margin-bottom:28px;padding-bottom:22px;border-bottom:1.5px solid var(--color-border-primary);}
.hdr-tag{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:10px;}
.hdr-h{font-family:'Newsreader',Georgia,serif;font-size:40px;font-weight:500;color:var(--color-text-primary);line-height:1.08;letter-spacing:-0.35px;}
.hdr-h em{font-style:italic;color:#A32D2D;}
.hdr-p{max-width:620px;font-size:16px;font-weight:400;color:var(--color-text-secondary);margin-top:14px;line-height:1.75;}

.prog-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.prog-track{flex:1;height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;}
.prog-bar{height:100%;background:var(--color-text-primary);border-radius:2px;transition:width .3s ease;}
.prog-txt{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:1px;white-space:nowrap;}

.card,.result{
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-lg);
  box-shadow:var(--shadow-soft);
}

.card{padding:24px;margin-bottom:16px;}
.q-num{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:12px;}
.q-txt{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.55;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{appearance:none;width:100%;text-align:left;padding:12px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:400;color:var(--color-text-primary);line-height:1.45;transition:all .15s ease;display:flex;align-items:flex-start;gap:10px;}
.opt:hover:not(:disabled){background:var(--color-background-secondary);border-color:var(--color-border-primary);}
.opt:disabled{cursor:default;}
.opt.ok{background:#EAF3DE;border-color:#3B6D11;color:#173404;}
.opt.no{background:#FCEBEB;border-color:#A32D2D;color:#501313;}
.opt.reveal{background:#EAF3DE;border-color:#3B6D11;color:#173404;opacity:.7;}
.ltr{font-size:11px;font-weight:500;min-width:18px;height:18px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s ease;}
.opt.ok .ltr{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11;}
.opt.no .ltr{background:#A32D2D;color:#FCEBEB;border-color:#A32D2D;}
.opt.reveal .ltr{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11;}

.fb{margin-top:14px;padding:12px 14px;border-radius:var(--border-radius-md);font-size:12.5px;font-weight:400;line-height:1.65;display:none;}
.fb.vis{display:block;}
.fb-ok{background:#EAF3DE;color:#173404;border-left:2px solid #1A5C4A;}
.fb-no{background:#FCEBEB;color:#501313;border-left:2px solid #A32D2D;}
.fb strong{font-weight:500;}

.next{margin-top:16px;width:100%;padding:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:var(--color-text-primary);display:none;transition:all .15s ease;}
.next:hover{background:var(--color-background-secondary);border-color:var(--color-border-primary);}
.next.vis{display:block;}

.result{padding:32px;text-align:center;display:none;}
.result.vis{display:block;}
.r-icon{width:56px;height:56px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}
.r-score{font-family:'Newsreader',Georgia,serif;font-size:56px;font-weight:500;line-height:1;margin-bottom:4px;}
.r-pct{font-size:13px;font-weight:400;color:var(--color-text-secondary);margin-bottom:24px;}
.r-title{font-family:'Newsreader',Georgia,serif;font-size:22px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;}
.r-sub{font-size:13px;font-weight:400;color:var(--color-text-secondary);line-height:1.65;max-width:440px;margin:0 auto 24px;}
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.r-box{padding:14px 12px;border-radius:var(--border-radius-md);text-align:left;}
.r-n{font-family:'Newsreader',Georgia,serif;font-size:26px;font-weight:500;line-height:1;margin-bottom:4px;}
.r-l{font-size:11px;font-weight:400;color:var(--color-text-secondary);}
.r-btn{padding:10px 24px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:var(--color-text-primary);transition:all .15s ease;}
.r-btn:hover{background:var(--color-background-secondary);border-color:var(--color-border-primary);}

@media (max-width:640px){
  body{padding:14px 12px 56px;}
  .wrap{padding:16px 0 32px;}
  .hdr{margin-bottom:22px;padding-bottom:18px;}
  .hdr-h{font-size:32px;}
  .hdr-p{font-size:14px;line-height:1.72;}
  .card,.result{padding:20px;}
  .r-grid{grid-template-columns:1fr;}
}
</style>

<div class="wrap">
<div class="hdr">
  <div class="hdr-tag">Germany &middot; Digital Products &middot; Pre-read check</div>
  <div class="hdr-h">How wrong are your <em>assumptions?</em></div>
  <div class="hdr-p">10 quick checks based on real German enforcement cases. Pick the safest product decision.</div>
</div>
<div class="prog-row">
  <div class="prog-track"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  <div class="prog-txt" id="pt">0 / 10</div>
</div>
<div id="qc"></div>
<div class="result" id="res"></div>
</div>

<script>
const QS = [
  {
    q: "A German court reviewed a cookie banner that had both an Accept button and a Reject button. The court still found the banner unlawful. What was the reason?",
    opts: [
      "The banner was only available in German, with no English option",
      "The Accept button was a prominent colour while the Reject button was grey — making them visually unequal",
      "The banner appeared at the bottom of the page rather than in the centre",
      "The banner did not include a link to the privacy policy"
    ],
    correct: 1,
    ok: "OLG Bamberg ruled in February 2025 that designing Accept as visually prominent while making Reject grey or subdued constitutes an aggressive commercial practice under UWG §4a — even when both buttons are present. The legal standard is equal visual weight, not just equal button count. Colour, size, and positioning all factor into the assessment.",
    no: "OLG Bamberg ruled in February 2025 that the visual asymmetry between the buttons was the violation. Making Accept prominent while Reject was grey constitutes an aggressive commercial practice under UWG §4a, regardless of having two buttons. The legal standard requires equal visual weight: same colour prominence, same size, comparable positioning."
  },
  {
    q: "A Berlin-based neobank was fined by BaFin and had a cap imposed on new customer registrations — limiting them to 50,000 per month versus their prior growth of 170,000 per month. Both co-founders eventually resigned. What was the core compliance failure?",
    opts: [
      "The bank operated without a BaFin banking licence",
      "The bank had inadequate data protection measures for customer PII",
      "The bank systematically filed suspicious transaction reports late, over multiple years",
      "The bank failed to provide German-language customer contracts"
    ],
    correct: 2,
    ok: "This was N26. BaFin fined the bank €4.25M in 2021 and €9.2M in 2024 for systematic late submission of anti-money-laundering suspicious transaction reports (Verdachtsmeldungen). The growth cap — 50,000 new customers per month — was a direct operational consequence that lasted years and cost the company far more than the fines themselves. AML compliance failures in Germany carry consequences well beyond the fine amount.",
    no: "This was N26. The failure was AML: the bank systematically filed suspicious transaction reports late over multiple years. BaFin's response went beyond fines — it imposed a hard cap on new customer growth, appointed a special monitor, and later imposed additional capital requirements. The cumulative business cost vastly exceeded the fine amount. German financial regulation treats systematic AML failures as existential operational risks."
  },
  {
    q: "A product team uses Google Tag Manager on their marketing website. Their consent management platform (CMP) shows a cookie banner before any user action. A German court in 2025 found this setup still non-compliant. What was the court's reasoning?",
    opts: [
      "The CMP provider was not on the official German approved vendor list",
      "Loading Google Tag Manager itself transmits the user's IP address to Google's servers before any consent choice is made",
      "The consent banner text was not specific enough about which cookies would be set",
      "Google Analytics is not permitted under German law regardless of consent"
    ],
    correct: 1,
    ok: "Verwaltungsgericht Hannover ruled in March 2025 that GTM must not load until after the user has actively consented — because the act of loading GTM contacts Google's servers and transmits the user's IP address and device information. This happens before any tags fire and before the user makes a consent choice. The implication: GTM must be held in a fully silent state while the banner is displayed, and only triggered post-consent.",
    no: "VG Hannover (March 2025) found that loading GTM itself is a data transmission event — it contacts Google servers and passes IP and device data the moment it initialises, regardless of whether any tags have fired. The cookie banner must therefore appear while GTM is completely inactive. Only after the user clicks Accept may GTM load. A banner that relies on GTM to display is already non-compliant at the moment of display."
  },
  {
    q: "A software company publishes a mobile app with the tagline 'Track your glucose levels and identify patterns that may indicate early-stage diabetes risk.' The app store listing includes a disclaimer: 'This app does not provide medical diagnosis.' Under German and EU law, how is this app most likely classified?",
    opts: [
      "A general wellness app, because of the disclaimer",
      "A medical device, because the intended purpose communicated to users describes a diagnostic or monitoring function",
      "A research tool, which has a different regulatory pathway",
      "Classification depends on whether the app charges a fee"
    ],
    correct: 1,
    ok: "Under MDR Rule 11, software is classified as a medical device based on its 'intended purpose' — the totality of what the manufacturer communicates to users, including marketing copy, app store descriptions, and feature names. A disclaimer does not override an intended purpose claim. 'Identify patterns that may indicate early-stage diabetes risk' describes a diagnostic function. Without CE certification as at minimum a Class IIa medical device, this constitutes an unlicensed medical device. Under MPDG §92, commercial violations can carry up to 10 years imprisonment.",
    no: "MDR Rule 11 determines medical device classification by intended purpose — what the developer communicates to users across all touchpoints. The disclaimer is legally irrelevant when the marketing copy explicitly describes a diagnostic or monitoring function. The app store description is treated as evidence of intended purpose. CE certification as a medical device (minimum Class IIa) would be required before German market placement. Without it: up to 10 years imprisonment under MPDG §92 for commercial violations."
  },
  {
    q: "A company deploys a new productivity analytics dashboard for its German operations. The dashboard tracks individual employee login times, documents edited, and messages sent, then aggregates this data into team-level averages that managers can view. No individual-level data is shown in the output. Is prior Betriebsrat (works council) approval required?",
    opts: [
      "No, because individual employee data is not visible in the output",
      "No, because productivity tracking is a standard management function",
      "Yes, because the underlying system collects individual-level data and is therefore objectively capable of monitoring individual behaviour, regardless of how the output is displayed",
      "Only if the company has more than 500 employees"
    ],
    correct: 2,
    ok: "BetrVG §87(1) Nr. 6 applies an 'objective suitability' standard: if a technical system is objectively capable of monitoring employee behaviour or performance at any stage — even if the visible output is aggregated — co-determination rights are triggered and Betriebsrat approval is required before deployment. The test is not what the dashboard shows managers, but what data the system collects. A five-person team where 'team average' is reported is effectively individual monitoring. Deployment without a Betriebsvereinbarung is automatically legally void.",
    no: "BetrVG §87(1) Nr. 6 uses an 'objective suitability' test, not an output test. If the system collects individual-level data at any point — even to aggregate it later — the system is objectively capable of monitoring individuals, and Betriebsrat consent is required. The legal question is about data collection capability, not dashboard display. Deployment without prior written Betriebsrat agreement is void from the start and the works council can seek an immediate injunction."
  },
  {
    q: "A SaaS company with €4M annual revenue processes data for a German subsidiary of a multinational group. A GDPR violation is found. After the ECJ's ruling in the Deutsche Wohnen case (C-807/21, 2023), what is the potential basis for calculating the fine?",
    opts: [
      "Only the SaaS company's own €4M revenue, capped at 4%",
      "The number of individuals whose data was affected",
      "The fine could be calculated against the group-wide global turnover of the entire corporate undertaking — not just the violating entity",
      "The fine is capped at a fixed maximum of €20M regardless of turnover"
    ],
    correct: 2,
    ok: "The ECJ in C-807/21 confirmed that GDPR fines apply to the 'undertaking' as defined in EU competition law — meaning the entire economic unit under common control. If the violating entity is part of a larger group, the fine ceiling is calculated against the group's global consolidated turnover. This means a small company that is a subsidiary of a large enterprise faces a fine ceiling based on the parent group's total revenue, not its own. The theoretical maximum for serious violations is 4% of that global figure.",
    no: "ECJ C-807/21 confirmed that the GDPR fine ceiling is calculated against the 'undertaking' — the entire controlled group, borrowing the concept from EU competition law. A subsidiary's own revenue is not the relevant baseline if it is part of a larger corporate group. The fine ceiling is 4% of the group's global annual turnover. This is why data processor agreements in German enterprise contracts typically include specific liability caps — because without them, uncapped group-level exposure can be enormous."
  },
  {
    q: "An international SaaS company launches a consumer subscription product in Germany. Their cancellation flow requires users to navigate to Account Settings, click 'Manage subscription,' then contact customer support to process the cancellation. Sign-up takes one click. A German court reviews this. What is the most likely outcome?",
    opts: [
      "Compliant, as long as the cancellation option is documented in the terms of service",
      "Compliant, because there is no German law specifying how many steps a cancellation must take",
      "Non-compliant under BGB §312k — which requires a clearly visible cancellation button that makes termination no harder than sign-up",
      "Non-compliant only if the company has more than 10,000 German subscribers"
    ],
    correct: 2,
    ok: "BGB §312k has been in force since July 2022 and requires all consumer subscription websites to provide a permanently visible cancellation button labelled 'Jetzt kuendigen' (or equivalent), accessible within two clicks, without requiring login as a prerequisite. The standard set by over 67 court rulings is that cancellation must be no harder than sign-up. A multi-step process requiring customer support contact fails this standard entirely. Violation: the consumer may cancel immediately with no notice period required (BGB §312k(6)).",
    no: "BGB §312k requires a permanently visible 'Jetzt kuendigen' button accessible within two clicks — and OLG Koeln ruled in January 2025 that even requiring a login before seeing the cancel button is unlawful. A cancellation process that routes users through support violates both the accessibility and simplicity requirements. By 2026, there are over 67 published court rulings on this provision. Consequence: the consumer can terminate immediately with no notice period."
  },
  {
    q: "A company builds an AI system that analyses users' rental history, social media activity, and financial transactions to generate a 'reliability index' score. This score is then used by landlords on the platform to decide whether to rent to a user. The EU AI Act Art. 5(1)(c) prohibition on social scoring has been in force since February 2025. Does this system fall within the prohibition?",
    opts: [
      "No, because the system is operated by a private company, not a government authority",
      "No, because users have consented to the scoring as part of the platform terms",
      "Yes, because the system classifies individuals based on personal behaviour and uses that classification to produce detrimental effects — in this case, denial of housing — regardless of operator type or user consent",
      "Only if the system uses data from government sources"
    ],
    correct: 2,
    ok: "Art. 5(1)(c) applies to both public and private entities. The prohibition covers AI systems that evaluate individuals based on social behaviour or personal characteristics and use those classifications to produce detrimental treatment — particularly in contexts unrelated to the original data collection, or where the treatment is disproportionate. Scoring a user's 'reliability' based on social media activity and using that to determine housing access is precisely this structure. User consent does not override an absolute prohibition. Fine: up to €35M or 7% of global annual turnover.",
    no: "Art. 5(1)(c) explicitly applies to private operators, not just governments. The prohibition is on the function — classifying people by behaviour and producing detrimental effects in unrelated contexts — not on who operates the system or whether users consented. Social scoring prohibitions in the EU AI Act are 'absolute': they cannot be unlocked by consent, contractual agreement, or business justification. Fine ceiling: €35M or 7% of global annual turnover."
  },
  {
    q: "A recruitment software company uses AI to score and rank job applicants. A human HR manager reviews the ranked list and makes all final hiring decisions. Under the CJEU's ruling in SCHUFA Holding (C-634/21, December 2023) and subsequent German DSK guidance, how should this system be assessed under GDPR Art. 22?",
    opts: [
      "Art. 22 does not apply because a human makes every final decision",
      "Art. 22 applies only if the HR manager follows the AI ranking more than 90% of the time",
      "The CJEU established that Art. 22 can apply even with nominal human involvement, if the AI output is 'determinative in practice' — meaning the human review must be genuinely independent to constitute meaningful oversight",
      "Art. 22 applies only to decisions about existing employees, not recruitment"
    ],
    correct: 2,
    ok: "The CJEU ruled in C-634/21 that a credit score was subject to Art. 22 even though a human bank official made the final lending decision — because the score was 'determinative in practice.' German DSK guidance (2024) extended this reasoning: an HR manager who consistently approves AI recommendations without independent investigation does not constitute the human oversight required to exempt a system from Art. 22. The test is the quality of the human review, not its nominal presence.",
    no: "The CJEU established in C-634/21 that nominal human involvement is not sufficient to escape Art. 22 if the AI output drives the outcome in practice. The ruling centred on whether the human decision-maker exercises genuine, independent judgment — or simply ratifies the AI output. German DSK guidance (2024) applied this directly to HR contexts: an AI ranking system where human review is perfunctory triggers Art. 22 obligations regardless of who signs the final decision."
  },
  {
    q: "A company's mobile app includes features powered by a third-party large language model, accessed via API. The company does not modify the underlying model. When the EU AI Act's obligations for high-risk AI systems fully apply from August 2026, which of the following best describes the company's legal position?",
    opts: [
      "The company has no obligations — all responsibility sits with the model provider",
      "The company only needs to disclose AI use in its privacy policy",
      "The company is a 'deployer' under the EU AI Act and has independent obligations: ensuring the AI is used within its intended purpose, implementing human oversight for high-risk applications, transparency toward affected users, and in some cases a fundamental rights impact assessment",
      "Obligations only apply if the company fine-tunes or modifies the model"
    ],
    correct: 2,
    ok: "The EU AI Act explicitly separates 'providers' (those who develop or place AI on the market) from 'deployers' (those who use AI in their own products or services). Both carry independent obligations. As a deployer, the company must ensure the AI is used within the provider's documented intended purpose, implement human oversight for high-risk systems, inform affected individuals about AI involvement, and conduct fundamental rights impact assessments in specified contexts. If the company substantially modifies the AI's purpose or functioning, it may be reclassified as a provider with the full provider obligation set.",
    no: "The EU AI Act creates a two-layer responsibility structure. Providers build or place AI on the market; deployers use AI in products or services. Both carry their own legal obligations — the deployer's liability does not transfer upstream to the provider simply because an API is used. Deployer obligations include: scope compliance, human oversight implementation, transparency to affected users, and in certain cases a fundamental rights impact assessment. Using an API without modification does not eliminate deployer obligations."
  }
];

let cur=0,score=0,picked=false;

function compactText(text, limit=250){
  if(text.length<=limit)return text;
  return text.slice(0,limit).replace(/\s+\S*$/,'')+'…';
}

function render(){
  const q=QS[cur];
  document.getElementById('pb').style.width=(cur/QS.length*100)+'%';
  document.getElementById('pt').textContent=cur+' / '+QS.length;
  const L=['A','B','C','D'];
  let opts='';
  q.opts.forEach((o,i)=>{
    opts+=`<button class="opt" id="o${i}" onclick="pick(${i})"><span class="ltr">${L[i]}</span><span>${o}</span></button>`;
  });
  document.getElementById('qc').innerHTML=`
    <div class="card">
      <div class="q-num">QUESTION ${cur+1} OF ${QS.length}</div>
      <div class="q-txt">${q.q}</div>
      <div class="opts">${opts}</div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="next" id="nb" onclick="advance()">${cur===QS.length-1?'See results &rarr;':'Next &rarr;'}</button>
  `;
  picked=false;
}

function pick(i){
  if(picked)return;
  picked=true;
  const q=QS[cur];
  const win=i===q.correct;
  if(win)score++;
  q.opts.forEach((_,j)=>{
    const b=document.getElementById('o'+j);
    b.disabled=true;
    if(j===q.correct) b.classList.add(win?'ok':'reveal');
    if(j===i&&!win) b.classList.add('no');
  });
  const fb=document.getElementById('fb');
  fb.className='fb vis '+(win?'fb-ok':'fb-no');
  fb.innerHTML=(win?'<strong>Correct.</strong> ':'<strong>Not quite.</strong> ')+compactText(win?q.ok:q.no);
  document.getElementById('nb').classList.add('vis');
}

function advance(){
  cur++;
  if(cur>=QS.length) showResult();
  else render();
}

function showResult(){
  document.getElementById('qc').innerHTML='';
  document.getElementById('pb').style.width='100%';
  document.getElementById('pt').textContent=QS.length+' / '+QS.length;
  const pct=Math.round(score/QS.length*100);
  let title,msg,iconBg,iconSvg,scoreCol;
  if(pct>=80){
    title='Your instincts are sharper than most';
    msg='You already have a solid read on how Germany works. The handbook will sharpen the details — and the few surprises you encountered are worth noting.';
    iconBg='#EAF3DE';iconSvg='<circle cx="14" cy="14" r="12" stroke="#1A5C4A" stroke-width="1.5"/><path d="M9 14.5L12 17.5L19 10.5" stroke="#1A5C4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';scoreCol='#1A5C4A';
  } else if(pct>=40){
    title='You have some gaps worth closing';
    msg='You got the familiar rules right. The ones you missed are exactly the decisions that create legal exposure — because they feel safe until they are not. The explanations for each wrong answer are the most valuable part.';
    iconBg='#FAEEDA';iconSvg='<circle cx="14" cy="14" r="12" stroke="#854F0B" stroke-width="1.5"/><line x1="14" y1="8" x2="14" y2="16" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/><circle cx="14" cy="19.5" r="1" fill="#854F0B"/>';scoreCol='#854F0B';
  } else {
    title='The rules that surprised you are the costly ones';
    msg='Every question you missed corresponds to a real fine, a real court ruling, or a real product shutdown. Now you know exactly where to focus when reading the handbook.';
    iconBg='#FCEBEB';iconSvg='<circle cx="14" cy="14" r="12" stroke="#A32D2D" stroke-width="1.5"/><path d="M9 9L19 19M19 9L9 19" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round"/>'; scoreCol='#A32D2D';
  }
  document.getElementById('res').className='result vis';
  document.getElementById('res').innerHTML=`
    <div class="r-icon" style="background:${iconBg};"><svg width="28" height="28" viewBox="0 0 28 28" fill="none">${iconSvg}</svg></div>
    <div class="r-score" style="color:${scoreCol}">${score}<span style="font-size:24px;color:var(--color-text-tertiary)">/${QS.length}</span></div>
    <div class="r-pct">${pct}% correct</div>
    <div class="r-title">${title}</div>
    <div class="r-sub">${msg}</div>
    <div class="r-grid">
      <div class="r-box" style="background:#EAF3DE;"><div class="r-n" style="color:#1A5C4A;">${score}</div><div class="r-l">Correct</div></div>
      <div class="r-box" style="background:#FCEBEB;"><div class="r-n" style="color:#A32D2D;">${QS.length-score}</div><div class="r-l">Surprising</div></div>
    </div>
    <button class="r-btn" onclick="restart()">Retake</button>
  `;
}

function restart(){cur=0;score=0;picked=false;document.getElementById('res').className='result';render();}
